services:
  db:
    env_file: .env
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dash_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./etl/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./etl/seeds/actividad_hotelera_estatal.sql:/docker-entrypoint-initdb.d/02-actividad-hotelera-estatal.sql
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dash_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  etl:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dash_db}
      INEGI_TOKEN: ${INEGI_TOKEN}
      BANXICO_TOKEN: ${BANXICO_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    command: python -m etl.run
    volumes:
      - .:/app
      - /app/.venv
    profiles:
      - tools

  cron:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dash_db}
      INEGI_TOKEN: ${INEGI_TOKEN}
      BANXICO_TOKEN: ${BANXICO_TOKEN}
      TZ: America/Mexico_City
    depends_on:
      db:
        condition: service_healthy
    command: ["/usr/sbin/cron", "-f"]

  web:
    build: .
    env_file: .env
    ports:
      - "${API_PORT:-8080}:5000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dash_db}
      APP_USER: ${APP_USER}
      APP_PASSWORD: ${APP_PASSWORD}
      APP_SKIP_AUTH: ${APP_SKIP_AUTH:-0}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-dev-secret-key}
      INEGI_TOKEN: ${INEGI_TOKEN}
      BANXICO_TOKEN: ${BANXICO_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/.venv
      - ./assets:/app/assets:ro

volumes:
  postgres_data:
